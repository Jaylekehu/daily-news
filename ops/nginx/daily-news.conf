server {
    listen 80;
    server_name daily.2077.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name daily.2077.fun;

    root /var/www/daily-news;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/daily.2077.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daily.2077.fun/privkey.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /public/data/latest.json {
        add_header Cache-Control "no-cache";
    }

    location /public/data/archive/ {
        add_header Cache-Control "public, max-age=300";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=86400";
    }
}
