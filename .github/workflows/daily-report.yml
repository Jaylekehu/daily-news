name: Daily report

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Target report date in YYYY-MM-DD. Defaults to yesterday in Asia/Shanghai."
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          REPORT_DATE: ${{ inputs.report_date }}
        run: node scripts/generate-report.mjs

      - name: Validate report
        run: node scripts/validate-report.mjs public/data/latest.json

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily report"
          file_pattern: "public/data/latest.json public/data/archive/*.json"
