name: Daily report

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Target report date in YYYY-MM-DD. Defaults to yesterday in Asia/Shanghai."
        required: false
        type: string
      force_regenerate:
        description: "Regenerate even if the target date already exists."
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          REPORT_DATE: ${{ inputs.report_date }}
          FORCE_REPORT: ${{ inputs.force_regenerate || '0' }}
        run: node scripts/generate-report.mjs

      - name: Validate report
        run: node scripts/validate-report.mjs public/data/latest.json

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily report"
          file_pattern: "public/data/latest.json public/data/archive/*.json"

      - name: Prepare deploy directory
        run: |
          mkdir -p .deploy/public/data/archive
          cp index.html app.js styles.css .deploy/
          cp -R public/data .deploy/public/

      - name: Upload site to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          source: ".deploy/*"
          target: "/tmp/daily-news-release"
          overwrite: true
          strip_components: 1

      - name: Publish site on ECS
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_DIR: /var/www/daily-news
          RELEASE_DIR: /tmp/daily-news-release
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          envs: TARGET_DIR,RELEASE_DIR
          script: |
            set -eu
            mkdir -p "$TARGET_DIR"
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -R "$RELEASE_DIR"/. "$TARGET_DIR"/
            chown -R nginx:nginx "$TARGET_DIR" || true
            nginx -t
            systemctl reload nginx
