<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>昨日热点看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="date-bar">
        <div>
          <span class="muted">日报日期</span>
          <strong id="report-date">读取中</strong>
        </div>
        <div class="status" id="report-status">正在加载最新日报</div>
        <label>
          领域
          <select id="domain-filter"></select>
        </label>
      </header>

      <section id="report-board" class="report-board" aria-label="热点看板"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
